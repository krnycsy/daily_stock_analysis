name: Sync Upstream

on:
  schedule:
    - cron: '0 0 1 * *' 
  workflow_dispatch:   

# 显式声明全局权限，强制覆盖 UI 界面可能的设置失效
permissions:
  contents: write
  pull-requests: write

env:
  # 强制使用 Node 24 运行以消除警告
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync_upstream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # 使用自动生成的 Token 进行验证
          token: ${{ github.token }}

      - name: Force Sync with Upstream
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@://github.com"
          
          # 添加上游仓库地址
          git remote add upstream https://github.com || true
          
          # 获取上游最新代码
          git fetch upstream main
          
          # 强行切换并重置本地 main 分支
          git checkout -B main
          git reset --hard upstream/main
          
          # 强行推送到你的仓库
          git push origin main --force


