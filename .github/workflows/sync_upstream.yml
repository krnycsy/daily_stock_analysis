name: Sync Upstream

on:
  schedule:
    - cron: '0 0 * * *' 
  workflow_dispatch:   

jobs:
  sync_upstream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4  # 升级到 v4 以支持 Node 24
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }} # 显式传递权限

      - name: Sync with Upstream
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          
          # 检查是否已添加过 upstream，防止报错 128
          git remote add upstream https://github.com || git remote set-url upstream https://github.com
          
          git fetch upstream
          git checkout main
          
          # 使用 rebase 或 merge 保持同步
          git merge upstream/main --allow-unrelated-histories -m "Automatically synced from upstream"
          
          # 推送更新
          git push origin main

